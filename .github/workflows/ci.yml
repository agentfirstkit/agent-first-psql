name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16@sha256:71e27bf60b70bded003791b5573f8b808365613f341df20ffcf0c1ed7bc13ddf
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AFPSQL_TEST_DSN_SECRET: postgresql://test:test@localhost:5432/test?sslmode=disable
      DATABASE_URL: postgresql://test:test@localhost:5432/test?sslmode=disable
      PGSSLMODE: disable

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install afdata skill validator
        run: cargo install agent-first-data --locked --features skill

      - name: Validate Agent Skill
        run: afdata skill validate skills/agent-first-psql

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit
        run: cargo test --bin afpsql

      - name: PostgreSQL smoke
        run: cargo run -- --dsn-secret "$AFPSQL_TEST_DSN_SECRET" --sql "select 1 as n"

      - name: Integration
        run: |
          cargo build
          cargo test --tests

  container-e2e:
    runs-on: ubuntu-latest

    env:
      AFPSQL_E2E: "1"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Configure SSH transport fixture
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keygen -q -t ed25519 -N '' -f "$HOME/.ssh/id_ed25519"
          cat "$HOME/.ssh/id_ed25519.pub" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"
          sudo systemctl start ssh
          ssh-keyscan -H localhost 127.0.0.1 >> "$HOME/.ssh/known_hosts" 2>/dev/null
          echo "AFPSQL_E2E_SSH=$USER@localhost" >> "$GITHUB_ENV"
          echo "AFPSQL_E2E_SSH_PROXY_JUMP=$USER@127.0.0.1" >> "$GITHUB_ENV"

      - name: Docker container transport
        run: |
          docker version
          docker pull postgres:16
          docker pull ubuntu:22.04
          cargo test --test container_e2e -- --ignored --nocapture
